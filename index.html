<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Library of Syifa Nabila</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  scroll-behavior:smooth;
}

body{
  font-family: 'Playfair Display', serif;
}

/* ================= HEADER FIXED ================= */
.navbar{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 60px;
  background:#800020;
  z-index:1000;
}

.logo{
  font-size:16px;
  color:white;
  font-weight:600;
}

.nav-links{
  display:flex;
  gap:20px;
}

.nav-links a{
  text-decoration:none;
  color:white;
  font-size:15px;
  transition:0.3s;
  cursor:pointer;
}

.nav-links a:hover{
  opacity:0.7;
}

/* ================= HERO ================= */
.hero{
  height:100vh;
  background-image:url('books.jpg');
  background-size:cover;
  background-position:center;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;
  padding-top:100px;
}

.hero::after{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.35);
  top:0;
  left:0;
}

.hero-content{
  position:relative;
  z-index:2;
  max-width:1000px;
  color:white;
}

.hero-content h1{
  font-size:70px;
  font-weight:800;
  margin-bottom:30px;
}

/* SEARCH BAR */
.search-box input{
  width:350px;
  max-width:90%;
  padding:15px 20px;
  border-radius:30px;
  border:none;
  font-size:16px;
  outline:none;
}

.search-box button{
  padding:15px 25px;
  border:none;
  border-radius:30px;
  background:#800020;
  color:white;
  cursor:pointer;
  margin-left:10px;
}

/* ================= POPUP STYLE (LOGIN & CONTACT) ================= */
.login-page,
.contact-page{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
  z-index:2000;
}

.login-container,
.contact-container{
  position:relative;
  background:white;
  padding:60px;
  border-radius:20px;
  width:100%;
  max-width:500px;
  box-shadow:0 20px 60px rgba(0,0,0,0.3);
  text-align:center;
}

.close-btn{
  position:absolute;
  top:20px;
  right:25px;
  font-size:18px;
  cursor:pointer;
  color:#800020;
}

.login-container h2,
.contact-container h2{
  margin-bottom:30px;
  color:#800020;
}

.login-container input,
.contact-container textarea{
  width:100%;
  padding:15px;
  margin-bottom:20px;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:14px;
}

.contact-container textarea{
  resize:none;
  height:120px;
}

.login-container button,
.contact-container button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:30px;
  background:#800020;
  color:white;
  font-size:16px;
  cursor:pointer;
  opacity:0.5;
  transition:0.3s;
}

.login-container button:enabled,
.contact-container button:enabled{
  opacity:1;
}

/* ================= KOLEKSI ================= */
.collection-section{
  padding:120px 40px;
  background:#800020;
  color:white;
}

.collection-section h2{
  text-align:center;
  font-size:35px;
  margin-bottom:60px;
}

.book-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
  gap:30px;
}

.book-card{
  background:white;
  padding:25px;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  transition:0.3s;
}

.book-card:hover{
  transform:translateY(-5px);
}

.book-card h3{
  color:#800020;
  margin-bottom:10px;
}

.book-card p{
  font-size:14px;
  color:#555;
}

/* ================= PROFILE ================= */
.profile-section{
  padding:120px 20px;
  background:#800020;
  display:flex;
  justify-content:center;
}

.profile-card{
  background:white;
  padding:60px;
  border-radius:20px;
  box-shadow:0 20px 60px rgba(0,0,0,0.2);
  text-align:center;
  max-width:700px;
}

.profile-photo img{
  width:180px;
  height:180px;
  border-radius:50%;
  object-fit:cover;
  border:5px solid #800020;
  margin-bottom:30px;
}

.profile-card h2{
  font-size:30px;
  margin-bottom:10px;
  color:#3a1b1f;
}

.profile-card h3{
  font-size:22px;
  font-weight:400;
  margin-bottom:20px;
  color:#3a1b1f;
}

.profile-description{
  font-size:16px;
  line-height:1.7;
  color:#444;
  margin-bottom:40px;
}

.buttons{
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
}

.buttons a{
  text-decoration:none;
  padding:12px 25px;
  border:1px solid #800020;
  color:#800020;
  border-radius:30px;
  transition:0.3s;
}

.buttons a:hover{
  background:#800020;
  color:white;
}

/* ================= VIDEO ================= */
.video-section{
  background:#800020;
  padding:100px 20px;
  text-align:center;
}

.video-section h2{
  color:white;
  font-size:32px;
  margin-bottom:40px;
}

.video-container{
  width:100%;
  max-width:900px;
  margin:0 auto;
}

.video-container iframe{
  width:100%;
  height:500px;
  border-radius:20px;
  box-shadow:0 20px 60px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<div class="navbar">
  <div class="logo">Syifa Nabila Story House</div>
  <div class="nav-links">
    <a href="#home">Home</a>
    <a onclick="openLogin()">Login</a>
    <a href="#collection">Koleksi</a>
    <a href="#profile">About Me</a>
    <a onclick="openContact()">Contact Us</a>
  </div>
</div>

<section class="hero" id="home">
  <div class="hero-content">
    <h1>Welcome to Library of Syifa Nabila</h1>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Cari koleksi, artikel atau topik...">
      <button onclick="searchBooks()">Cari</button>
    </div>
  </div>
</section>

<!-- LOGIN POPUP -->
<div class="login-page" id="loginPage">
  <div class="login-container">
    <span class="close-btn" onclick="closeLogin()">❌</span>
    <h2>Login</h2>
    <form id="loginForm">
      <input type="text" placeholder="First Name" required>
      <input type="text" placeholder="Last Name" required>
      <input type="text" placeholder="Email" required>
      <input type="text" placeholder="No Telephone" required>
      <input type="password" placeholder="Password" required>
      <button type="submit" id="loginBtn" disabled>Login</button>
    </form>
  </div>
</div>

<!-- CONTACT POPUP -->
<div class="contact-page" id="contactPage">
  <div class="contact-container">
    <span class="close-btn" onclick="closeContact()">❌</span>
    <h2>Contact Us</h2>
    <form id="contactForm">
      <textarea placeholder="Tulis pesan anda di sini..." required></textarea>
      <button type="submit" id="sendBtn" disabled>Send</button>
    </form>
  </div>
</div>

<script>
function searchBooks(){
  let input = document.getElementById("searchInput").value.toLowerCase();
  let books = document.getElementsByClassName("book-card");

  for(let i = 0; i < books.length; i++){
    let text = books[i].innerText.toLowerCase();
    books[i].style.display = text.includes(input) ? "block" : "none";
  }

  document.getElementById("collection").scrollIntoView({behavior:"smooth"});
}

function openLogin(){
  document.getElementById("loginPage").style.display = "flex";
}

function closeLogin(){
  document.getElementById("loginPage").style.display = "none";
}

function openContact(){
  document.getElementById("contactPage").style.display = "flex";
}

function closeContact(){
  document.getElementById("contactPage").style.display = "none";
}

/* LOGIN VALIDATION */
const loginInputs = document.querySelectorAll("#loginForm input");
const loginBtn = document.getElementById("loginBtn");

loginInputs.forEach(input => {
  input.addEventListener("input", () => {
    let allFilled = true;
    loginInputs.forEach(field => {
      if(field.value.trim() === "") allFilled = false;
    });
    loginBtn.disabled = !allFilled;
  });
});

document.getElementById("loginForm").addEventListener("submit", function(e){
  e.preventDefault();
  alert("Login berhasil 😊");
  closeLogin();
});

/* CONTACT VALIDATION */
const contactText = document.querySelector("#contactForm textarea");
const sendBtn = document.getElementById("sendBtn");

contactText.addEventListener("input", () => {
  sendBtn.disabled = contactText.value.trim() === "";
});

document.getElementById("contactForm").addEventListener("submit", function(e){
  e.preventDefault();
  alert("Pesan berhasil dikirim 📩");
  contactText.value="";
  sendBtn.disabled=true;
  closeContact();
});
</script>

</body>
</html>
