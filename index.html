<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Landing Page</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', sans-serif;
  background: #f4f5f7;
  color: #111;
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 25px 60px;
}

.logo {
  font-weight: 600;
  font-size: 18px;
}

.nav-links {
  display: flex;
  gap: 40px;
  font-size: 14px;
  color: #555;
}

.nav-links a {
  text-decoration: none;
  color: inherit;
}

.nav-btn {
  background: #1f1f2e;
  color: #fff;
  padding: 10px 20px;
  border-radius: 20px;
  text-decoration: none;
  font-size: 14px;
}

/* HERO */
.hero {
  max-width: 1200px;
  margin: 0 auto 60px auto;
  background: #e9ebf2;
  border-radius: 30px;
  overflow: hidden;
  padding: 80px 60px 0 60px;
  text-align: center;
  position: relative;
}

.hero h1 {
  font-size: 56px;
  font-weight: 600;
  margin-bottom: 20px;
}

.hero p {
  max-width: 600px;
  margin: 0 auto 30px auto;
  color: #555;
  font-size: 18px;
  line-height: 1.6;
}

.hero-btn {
  background: #111;
  color: white;
  padding: 12px 28px;
  border-radius: 25px;
  text-decoration: none;
  font-size: 14px;
  display: inline-block;
  margin-bottom: 60px;
}

/* HERO IMAGE */
.hero-image {
  width: 100%;
  height: 400px;
  background: url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1600&q=80');
  background-size: cover;
  background-position: center;
  border-bottom-left-radius: 30px;
  border-bottom-right-radius: 30px;
}

/* RESPONSIVE */
@media (max-width: 768px) {

  .navbar {
    padding: 20px 30px;
  }

  .nav-links {
    display: none;
  }

  .hero {
    padding: 60px 30px 0 30px;
  }

  .hero h1 {
    font-size: 36px;
  }

  .hero-image {
    height: 250px;
  }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">BloomFi</div>

  <div class="nav-links">
    <a href="#">About me</a>
  </div>

  <a href="#" class="nav-btn">Launch BETA</a>
</div>

<!-- HERO -->
<section class="hero">
  <h1>Syifa Nabila Story House</h1>

  <p>
    A programmable, utility-driven stable token designed for
    native value accrual and seamless integration into DeFi.
  </p>

  <a href="#" class="hero-btn">Try it now</a>

  <div class="hero-image"></div>
</section>

</body>
</html>
