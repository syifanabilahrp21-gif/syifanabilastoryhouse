<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Syifa Nabila Story House</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
  margin: 0;
  padding: 0;
  box-sizing: border-box;

  <body> 
  height: 100vh;
  background: #5C1A1B
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Poppins', sans-serif;
  overflow: hidden;

/* Sparkle */
.sparkle {
  position: absolute;
  width: 5px;
  height: 5px;
  background: rgba(255,255,255,0.8);
  border-radius: 50%;
  animation: sparkle 4s infinite ease-in-out;


@keyframes sparkle {
  0% { opacity: 0; transform: scale(0.5); }
  50% { opacity: 1; transform: scale(1.3); }
  100% { opacity: 0; transform: scale(0.5); }


/* Card */
.card {
  background: rgba(255, 248, 235, 0.65);
  backdrop-filter: blur(10px);
  border-radius: 40px;
  padding: 70px 90px;
  text-align: center;
  box-shadow: 0 30px 60px rgba(120, 80, 50, 0.25);
  max-width: 900px;


/* Title */
.card h1 {
  font-family: 'Playfair Display', serif;
  font-size: 64px;
  background: linear-gradient(90deg, #6b4f3a, #a67c52);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 20px;

/* Responsive */
@media (max-width: 768px) {
  .card { padding: 50px 30px; }
  .card h1 { font-size: 44px; }
  .countdown { flex-wrap: wrap; }

</style>
</head>

<body>

<!-- Sparkles -->
<script>
for (let i = 0; i < 25; i++) {
  const s = document.createElement('div');
  s.className = 'sparkle';
  s.style.left = Math.random() * 100 + 'vw';
  s.style.top = Math.random() * 100 + 'vh';
  s.style.animationDelay = Math.random() * 4 + 's';
  document.body.appendChild(s);
}
</script>

<!-- Ribbons -->
<div class="ribbon ribbon1"></div>
<div class="ribbon ribbon2"></div>
<div class="ribbon ribbon3"></div>

<div class="card">
  <h1>Selamat Datang</h1>

  <p>
    Website resmi <b>Syifa Nabila Story House</b>

</script>

</body>
</html>
