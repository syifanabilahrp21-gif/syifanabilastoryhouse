<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Library of Syifa Nabila</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', sans-serif;
  background: #f5f5f5;
  color: #111;
}

/* ================= NAVBAR ================= */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 25px 60px;
}

.logo {
  font-weight: 600;
  font-size: 18px;
}

.nav-links {
  position: relative;
}

.nav-links a {
  text-decoration: none;
  color: #555;
  font-size: 14px;
  cursor: pointer;
}

/* Dropdown */
.dropdown {
  position: relative;
  display: inline-block;
}

.dropdown-content {
  display: none;
  position: absolute;
  background-color: white;
  min-width: 180px;
  box-shadow: 0px 10px 25px rgba(0,0,0,0.08);
  border-radius: 10px;
  margin-top: 10px;
}

.dropdown-content a {
  color: #333;
  padding: 12px 15px;
  display: block;
  text-decoration: none;
  font-size: 14px;
}

.dropdown-content a:hover {
  background: #f3f3f3;
  border-radius: 10px;
}

.dropdown:hover .dropdown-content {
  display: block;
}

/* ================= HERO ================= */
.hero {
  max-width: 1200px;
  margin: 0 auto 60px auto;
  background: #f0f1f6;
  border-radius: 30px;
  overflow: hidden;
  padding: 80px 60px 0 60px;
  text-align: center;
}

.hero h1 {
  font-size: 56px;
  font-weight: 600;
  margin-bottom: 20px;
}

.hero p {
  max-width: 600px;
  margin: 0 auto 60px auto;
  color: #555;
  font-size: 18px;
  line-height: 1.6;
}

/* HERO IMAGE */
.hero-image img {
  width: 100%;
  height: 420px;
  object-fit: cover;
  border-bottom-left-radius: 30px;
  border-bottom-right-radius: 30px;
}
</style>
</head>

<body>

<!-- ================= NAVBAR ================= -->
<div class="navbar">
  <div class="logo">Syifa Nabila Story House 📖✨</div>

  <div class="nav-links">
    <div class="dropdown">
      <a>About Me ▾</a>
      <div class="dropdown-content">
        <a href="https://instagram.com/usernamekamu" target="_blank">
          Sosial Media
        </a>
        <a href="https://drive.google.com/file/d/123456789/view" target="_blank">
          Curriculum Vitae
        </a>
      </div>
    </div>
  </div>
</div>

<!-- ================= HERO ================= -->
<section class="hero">

  <h1>Library of Syifa Nabila</h1>

  <p>
    Sebuah perpustakaan yang akan membawa anda menuju pengetahuan
  </p>

  <div class="hero-image">
    <!-- Gambar buku estetik dominan merah -->
    <img src="https://images.unsplash.com/photo-1512820790803-83ca734da794?auto=format&fit=crop&w=1600&q=80" alt="Red Aesthetic Books">
  </div>

</section>

</body>
</html>
