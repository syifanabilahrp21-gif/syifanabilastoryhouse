<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Library of Syifa Nabila</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family: 'Playfair Display', serif;
}

/* ================= NAVBAR ================= */
.navbar{
  position:absolute;
  top:0;
  width:100%;
  padding:25px 60px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  color:white;
  z-index:10;
}

.logo{
  font-size:18px; /* diperkecil */
  letter-spacing:1px;
}

.nav-links a{
  margin-left:30px;
  text-decoration:none;
  color:white;
  font-size:16px;
}

/* ================= HERO ================= */
.hero{
  height:100vh;
  background-image:url('books.jpg'); 
  /* GANTI DENGAN NAMA FILE FOTO YANG KAMU KIRIM */
  background-size:cover;
  background-position:center;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;
}

.hero::after{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.35);
  top:0;
  left:0;
}

.hero-content{
  position:relative;
  z-index:2;
  max-width:1000px;
}

.hero-content h1{
  font-size:80px;
  font-weight:800;
  color:#ffffff;
  line-height:1.05;
  letter-spacing:-2px;
}

/* ================= PROFILE SECTION ================= */
.profile-section{
  padding:120px 20px;
  background:#f6f2ef;
  display:flex;
  justify-content:center;
}

.profile-card{
  background:white;
  padding:60px;
  border-radius:20px;
  box-shadow:0 20px 60px rgba(0,0,0,0.08);
  text-align:center;
  max-width:650px;
}

.profile-photo{
  margin-bottom:30px;
}

.profile-photo img{
  width:180px;
  height:180px;
  border-radius:50%;
  object-fit:cover;
  border:5px solid #c1121f;
}

.profile-card h2{
  font-size:30px;
  margin-bottom:10px;
}

.profile-card h3{
  font-size:22px;
  font-weight:400;
  margin-bottom:40px;
}

.buttons{
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
}

.buttons a{
  text-decoration:none;
  padding:12px 25px;
  border:1px solid #7b1e2b;
  color:#7b1e2b;
  border-radius:30px;
  transition:0.3s;
}

.buttons a:hover{
  background:#7b1e2b;
  color:white;
}

/* RESPONSIVE */
@media(max-width:768px){
  .hero-content h1{
    font-size:45px;
  }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">Syifa Nabila Story House</div>

  <div class="nav-links">
    <a href="#">Home</a>
    <a href="#profile">About Me</a>
    <a href="#profile">Kontak</a>
  </div>
</div>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h1>Welcome to Library of Syifa Nabila</h1>
  </div>
</section>

<!-- PROFILE SECTION -->
<section class="profile-section" id="profile">
  <div class="profile-card">

    <!-- FOTO KAMU TARUH DI SINI -->
    <div class="profile-photo">
      <img src="fotoku.jpg" alt="Syifa Nabila">
    </div>

    <h2>Syifa Nabila Harahap</h2>
    <h3>S-1 Perpustakaan dan Sains Informasi</h3>

    <div class="buttons">
      <a href="https://www.instagram.com/syfnbilah?" target="_blank">
        Sosial Media
      </a>
      <a href="https://drive.google.com/file/d/1V8x_vlSIHLk6N0AyGQNuhVLy-oytOJjq/view?usp=drivesdk" target="_blank">
        Curriculum Vitae
      </a>
    </div>

  </div>
</section>

</body>
</html>
