<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Library of Syifa Nabila</title>

<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@700&family=Crimson+Text:wght@400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#7b1e2b; /* maroon luar */
  font-family:'Crimson Text', serif;
}

/* CONTAINER PUTIH */
.container{
  background:white;
  max-width:1200px;
  margin:40px auto;
  border-radius:20px;
  padding:60px;
}

/* JUDUL ATAS */
.title{
  text-align:center;
  font-family:'Libre Baskerville', serif;
  font-size:42px;
  margin-bottom:60px;
}

/* CONTENT */
.content{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:60px;
  flex-wrap:wrap;
}

/* FOTO PROFIL */
.profile img{
  width:260px;
  height:260px;
  border-radius:50%;
  object-fit:cover;
  border:4px solid #7b1e2b; /* lebih kecil */
}

/* TEXT */
.text h2{
  font-size:36px;
  margin-bottom:20px;
}

.text h3{
  font-size:30px;
  font-weight:600;
}

/* FOTO BESAR BUKU */
.book-section{
  margin-top:70px;
}

.book-section img{
  width:100%;
  height:420px;
  object-fit:cover;
  border-radius:20px;
}
</style>
</head>

<body>

<div class="container">

  <div class="title">
    LIBRARY OF SYIFA NABILA HARAHAP
  </div>

  <div class="content">
    
    <div class="profile">
      <!-- FOTO KAMU -->
      <img src="profile.jpg.jpeg" alt="Syifa Nabila">
    </div>

    <div class="text">
      <h2>Syifa Nabila Harahap</h2>
      <h3>S-1 Perpustakaan dan Sains Informasi</h3>
    </div>

  </div>

  <!-- FOTO BUKU BESAR -->
  <div class="book-section">
    <img src="https://images.unsplash.com/photo-1519681393784-d120267933ba?auto=format&fit=crop&w=1600&q=80" alt="Red Books">
  </div>

</div>

</body>
</html>
