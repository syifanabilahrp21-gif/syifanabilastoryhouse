<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Library of Syifa Nabila</title>

<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Crimson+Text:wght@400;600&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#7b1e2b; /* MAROON BACKGROUND */
  font-family:'Source Sans 3', sans-serif;
  color:#2b2b2b;
}

/* ================= NAVBAR ================= */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:25px 60px;
  background:#7b1e2b;
  color:white;
}

.logo{
  font-family:'Libre Baskerville', serif;
  font-weight:700;
  font-size:20px;
}

/* About Button */
.about-wrapper{
  position:relative;
}

.about-btn{
  background:white;
  color:#7b1e2b;
  padding:10px 22px;
  border-radius:25px;
  cursor:pointer;
  border:none;
  font-weight:600;
}

/* Dropdown */
.dropdown-content{
  display:none;
  position:absolute;
  right:0;
  background:white;
  min-width:220px;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  margin-top:10px;
  overflow:hidden;
}

.dropdown-content a{
  display:block;
  padding:12px 18px;
  text-decoration:none;
  color:#333;
}

.dropdown-content a:hover{
  background:#f2f2f2;
}

.show{
  display:block;
}

/* ================= HERO ================= */
.hero{
  max-width:1200px;
  margin:40px auto 60px auto;
  background:white;
  border-radius:30px;
  padding:80px 60px;
}

.hero-content{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:40px;
  flex-wrap:wrap;
}

.hero-text{
  flex:1;
}

.hero-text h1{
  font-family:'Libre Baskerville', serif;
  font-size:48px;
  margin-bottom:25px;
}

.hero-text h2{
  font-family:'Crimson Text', serif;
  font-size:30px;
}

.hero-text h3{
  font-family:'Crimson Text', serif;
  font-weight:400;
  font-size:22px;
  margin-bottom:20px;
  color:#7b1e2b;
}

.hero-text p{
  font-size:18px;
  max-width:500px;
  line-height:1.7;
  color:#555;
}

/* PROFILE PHOTO */
.hero-photo{
  flex:1;
  display:flex;
  justify-content:center;
}

.hero-photo img{
  width:280px;
  height:280px;
  object-fit:cover;
  border-radius:50%;
  border:8px solid #7b1e2b;
  box-shadow:0 20px 40px rgba(0,0,0,0.15);
}

/* BOOK IMAGE */
.book-image{
  margin-top:60px;
}

.book-image img{
  width:100%;
  height:400px;
  object-fit:cover;
  border-radius:25px;
}

/* RESPONSIVE */
@media(max-width:768px){
  .hero-content{
    flex-direction:column;
    text-align:center;
  }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">Syifa Nabila Story House 📚</div>

  <div class="about-wrapper">
    <button class="about-btn" onclick="toggleDropdown()">About Me</button>

    <div id="dropdownMenu" class="dropdown-content">
      <a href="https://www.instagram.com/syfnbilah?igsh=MWFjeGhhZW05YWM3cg%3D%3D&utm_source=qr" target="_blank">
        Sosial Media
      </a>
      <a href="https://drive.google.com/file/d/1V8x_vlSIHLk6N0AyGQNuhVLy-oytOJjq/view?usp=drivesdk" target="_blank">
        Curriculum Vitae
      </a>
    </div>
  </div>
</div>

<!-- HERO -->
<section class="hero">

  <div class="hero-content">

    <div class="hero-text">
      <h1>Library of Syifa Nabila</h1>
      <h2>Syifa Nabila Harahap</h2>
      <h3>S-1 Perpustakaan dan Sains Informasi</h3>
      <p>
        Sebuah perpustakaan yang akan membawa anda menuju pengetahuan
      </p>
    </div>

    <div class="hero-photo">
      <!-- Pastikan nama file foto kamu: profile.jpg -->
      <img src="profile.jpg.jpeg" alt="Syifa Nabila">
    </div>

  </div>

  <div class="book-image">
    <img src="https://images.unsplash.com/photo-1519681393784-d120267933ba?auto=format&fit=crop&w=1600&q=80" alt="Red Books">
  </div>

</section>

<script>
function toggleDropdown(){
  document.getElementById("dropdownMenu").classList.toggle("show");
}

window.onclick = function(e){
  if(!e.target.matches('.about-btn')){
    var dropdown = document.getElementById("dropdownMenu");
    if(dropdown.classList.contains('show')){
      dropdown.classList.remove('show');
    }
  }
}
</script>

</body>
</html>
