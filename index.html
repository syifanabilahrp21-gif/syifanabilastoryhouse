<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sa-Na Public Library</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;scroll-behavior:smooth;}
body{font-family:'Playfair Display', serif;}

/* NAVBAR */
.navbar{
position:fixed;top:0;width:100%;
display:flex;justify-content:space-between;align-items:center;
padding:20px 60px;background:#800020;z-index:1000;
}

.logo{
display:flex;align-items:center;gap:12px;
color:white;font-size:16px;font-weight:600;
}

.logo img{
height:45px;width:auto;object-fit:contain;
transition:0.3s ease;
}

.logo img:hover{transform:scale(1.1);}

.nav-links{
display:flex;
align-items:center;
}

.nav-links a,
.dropbtn{
text-decoration:none;
color:white;
font-size:15px;
position:relative;
padding:0 18px;
cursor:pointer;
transition:0.3s;
}

.nav-links a:hover,
.dropbtn:hover{opacity:0.7;}

.nav-links a:not(:last-child)::after{
content:"|";
position:absolute;
right:-4px;
color:rgba(255,255,255,0.4);
font-weight:300;
}

/* DROPDOWN */
.dropdown{
position:relative;
display:inline-block;
margin-left:5px;
}

.dropdown-content{
position:absolute;
top:100%;
right:0;
background:white;
min-width:160px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
overflow:hidden;
opacity:0;
visibility:hidden;
transform:translateY(10px);
transition:all 0.3s ease;
z-index:2000;
}

.dropdown-content a{
color:#800020;
padding:12px 18px;
display:block;
text-decoration:none;
font-size:14px;
}

.dropdown-content a:hover{background:#f5f5f5;}

.dropdown:hover .dropdown-content{
opacity:1;
visibility:visible;
transform:translateY(0);
}

/* HERO */
.hero{
height:100vh;background-image:url('books.jpg');
background-size:cover;background-position:center;
display:flex;align-items:center;justify-content:center;
text-align:center;position:relative;padding-top:100px;
}

.hero::after{
content:"";position:absolute;width:100%;height:100%;
background:rgba(0,0,0,0.35);top:0;left:0;
}

.hero-content{position:relative;z-index:2;color:white;}
.hero-content h1{font-size:60px;margin-bottom:30px;}

.search-box input{
width:350px;max-width:90%;padding:15px 20px;
border-radius:30px;border:none;font-size:16px;outline:none;
}

.search-box button{
padding:15px 25px;border:none;border-radius:30px;
background:#800020;color:white;cursor:pointer;margin-left:10px;
}

/* KOLEKSI */
.collection-section{
padding:120px 40px;background:#800020;color:white;
}

.collection-section h2{
text-align:center;font-size:35px;margin-bottom:60px;
}

.book-grid{
display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
}

.book-card{
background:white;padding:25px;border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
transition:0.3s;
}

/* TAMBAHAN GAMBAR */
.book-card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:10px;
margin-bottom:15px;
}

.book-card:hover{transform:translateY(-5px);}
.book-card h3{color:#800020;margin-bottom:10px;}
.book-card p{font-size:14px;color:#555;}

/* ABOUT */
.about-section{
padding:140px 20px;
background:linear-gradient(to bottom,#800020,#5c0018);
display:flex;justify-content:center;
}

.about-container{
background:white;
max-width:900px;
padding:70px;
border-radius:25px;
box-shadow:0 25px 70px rgba(0,0,0,0.3);
text-align:center;
}

.about-container h2{
font-size:36px;
color:#800020;
margin-bottom:30px;
}

.about-container p{
font-size:17px;
line-height:1.9;
color:#444;
margin-bottom:25px;
}

/* VISI MISI TUJUAN */
.vmt-section{
padding:120px 20px;
background:#800020;
display:flex;
justify-content:center;
}

.vmt-container{
max-width:1000px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;
}

.vmt-card{
background:white;
color:#800020;
padding:40px;
border-radius:20px;
box-shadow:0 20px 50px rgba(0,0,0,0.3);
transition:0.3s;
}

.vmt-card:hover{
transform:translateY(-8px);
}

.vmt-card h2{
text-align:center;
margin-bottom:20px;
}

.vmt-card ul{
padding-left:20px;
line-height:1.8;
}

/* VIDEO */
.video-section{
background:#800020;padding:100px 20px;text-align:center;
}

.video-section h2{color:white;font-size:32px;margin-bottom:40px;}

.video-container{width:100%;max-width:900px;margin:0 auto;}

.video-container iframe{
width:100%;height:500px;border-radius:20px;
box-shadow:0 20px 60px rgba(0,0,0,0.3);
}

/* FOOTER */
.footer{
background:#5c0018;
color:white;
padding:60px 20px;
}

.footer-container{
max-width:1100px;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:40px;
}

.footer h3{
margin-bottom:20px;
font-size:18px;
border-bottom:1px solid rgba(255,255,255,0.3);
padding-bottom:10px;
}

.footer p{
font-size:14px;
line-height:1.8;
margin-bottom:12px;
display:flex;
align-items:center;
gap:10px;
}

.footer i{color:#ffccd5;}

.footer-bottom{
text-align:center;
margin-top:40px;
font-size:13px;
opacity:0.8;
border-top:1px solid rgba(255,255,255,0.3);
padding-top:20px;
}

@media(max-width:768px){
.hero-content h1{font-size:40px;}
.navbar{flex-direction:column;gap:10px;}
.video-container iframe{height:300px;}
}
</style>
</head>

<body>

<!-- NAVBAR tetap sama -->

<section class="collection-section" id="collection">
<h2>Koleksi Buku</h2>
<div class="book-grid">

<div class="book-card">
<img src="https://images.unsplash.com/photo-1512820790803-83ca734da794">
<h3>Manajemen Perpustakaan Modern</h3>
<p>Kategori: Manajemen Informasi</p>
</div>

<div class="book-card">
<img src="https://images.unsplash.com/photo-1524995997946-a1c2e315a42f">
<h3>Digital Library Transformation</h3>
<p>Kategori: Teknologi Informasi</p>
</div>

<div class="book-card">
<img src="https://images.unsplash.com/photo-1528207776546-365bb710ee93">
<h3>Klasifikasi dan Katalogisasi</h3>
<p>Kategori: Ilmu Perpustakaan</p>
</div>

<div class="book-card">
<img src="https://images.unsplash.com/photo-1497633762265-9d179a990aa6">
<h3>Information Literacy Skills</h3>
<p>Kategori: Edukasi</p>
</div>

</div>
</section>
