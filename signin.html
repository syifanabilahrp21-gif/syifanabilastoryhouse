<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: #800020;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.container{
    background: white;
    padding: 40px;
    border-radius: 15px;
    width: 300px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

h2{
    color: #800020;
}

input{
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 5px;
    border: 1px solid #ccc;
}

button{
    width: 100%;
    padding: 10px;
    background: #800020;
    color: white;
    border: none;
    border-radius: 20px;
    cursor: pointer;
}

button:hover{
    opacity: 0.9;
}
</style>
</head>

<body>

<div class="container">
    <h2>Login</h2>

    <input type="text" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>
</div>

<script>
function login(){
    let username = document.getElementById("username").value.trim();
    let password = document.getElementById("password").value.trim();

    // DATA LOGIN (contoh statis)
    let validUsername = "admin";
    let validPassword = "12345";

    // 1. CEK INPUT KOSONG
    if(username === "" || password === ""){
        alert("Input tidak lengkap!");
        return;
    }

    // 2. CEK BENAR / SALAH
    if(username === validUsername && password === validPassword){
        alert("Login sukses!");
    } else {
        alert("Login gagal!");
    }
}
</script>

</body>
</html>
