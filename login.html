<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Login - Syifa Nabila</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">

<style>
body{
font-family:'Playfair Display', serif;
background:#800020;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}
.login-box{
background:white;
padding:40px;
border-radius:15px;
width:350px;
text-align:center;
}
input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
}
button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
background:#800020;
color:white;
border-radius:25px;
cursor:pointer;
}
button:hover{opacity:0.9;}
</style>
</head>

<body>

<div class="login-box">
<h2>Login</h2>
<input type="text" placeholder="First Name">
<input type="text" placeholder="Last Name">
<input type="email" placeholder="Email">
<input type="password" placeholder="Password">
<input type="text" placeholder="No Telephone">
<button>Login</button>
</div>

</body>
</html>
